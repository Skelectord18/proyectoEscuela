<div id="Profesores">
      <h3>Registrar Profesor</h3>

      <input type="text" #nombreInput placeholder="Nombre Completo">
      <br><br>
      <input type="number" #idInput placeholder="ID">
      <br><br>
      
      <button id="btnGuardar" (click)="guardarProfesor(nombreInput.value, idInput.value)">
        Guardar Profesor
      </button>
</div>
